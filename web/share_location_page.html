<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location - Tourist Safety</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0F1117;
            --card: #1A1D27;
            --border: #2A2D37;
            --text: #E8E9ED;
            --text-sec: #9CA3AF;
            --accent: #4A9DFF;
            --success: #34D399;
            --red: #FF4D6A;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 20px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(74, 157, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg { width: 22px; height: 22px; fill: var(--accent); }

        .header-text h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-sec);
            margin-top: 2px;
        }

        .live-badge {
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse-dot 1.5s infinite ease-in-out;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* Map */
        #map {
            flex: 1;
            min-height: 55vh;
        }

        /* Info Card */
        .info-card {
            padding: 20px 24px;
            background: var(--card);
            border-top: 1px solid var(--border);
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .info-row:last-child { margin-bottom: 0; }

        .info-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-icon svg { width: 18px; height: 18px; }

        .info-label { font-size: 11px; color: var(--text-sec); font-weight: 500; }
        .info-value { font-size: 14px; font-weight: 600; margin-top: 2px; }

        .powered {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-sec);
            background: var(--bg);
        }

        .powered a { color: var(--accent); text-decoration: none; }

        /* Error state */
        .error-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 77, 106, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .error-icon svg { width: 40px; height: 40px; fill: var(--red); }

        .error-state h2 { font-size: 20px; margin-bottom: 8px; }
        .error-state p { color: var(--text-sec); font-size: 14px; max-width: 320px; }

        /* Leaflet overrides */
        .leaflet-control-zoom a {
            background: var(--card) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
        }

        .leaflet-control-attribution {
            background: rgba(15, 17, 23, 0.85) !important;
            color: var(--text-sec) !important;
            font-size: 10px !important;
        }

        .leaflet-control-attribution a { color: var(--accent) !important; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <div class="header-text">
            <h1 id="sharing-name">Loading...</h1>
            <p>is sharing their live location</p>
        </div>
        <div class="live-badge">
            <div class="live-dot"></div>
            LIVE
        </div>
    </div>

    <div id="map"></div>

    <div class="info-card" id="info-card">
        <div class="info-row">
            <div class="info-icon" style="background: rgba(74, 157, 255, 0.12);">
                <svg viewBox="0 0 24 24" fill="#4A9DFF"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            </div>
            <div>
                <div class="info-label">Coordinates</div>
                <div class="info-value" id="coords">—</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon" style="background: rgba(52, 211, 153, 0.12);">
                <svg viewBox="0 0 24 24" fill="#34D399"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            </div>
            <div>
                <div class="info-label">Last Updated</div>
                <div class="info-value" id="timestamp">—</div>
            </div>
        </div>
    </div>

    <div class="powered">
        Powered by <a href="#">Tourist Safety App</a> — Smart Tourist Safety Monitoring System
    </div>

    <!-- Error state (hidden by default) -->
    <div class="error-state" id="error-state" style="display: none;">
        <div class="error-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        </div>
        <h2>Invalid Link</h2>
        <p>This location sharing link appears to be invalid or has expired. Please ask the person to share a new link.</p>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const lat = parseFloat(params.get('lat'));
            const lng = parseFloat(params.get('lng'));
            const name = params.get('name') || 'Someone';
            const session = params.get('session');

            // Validate
            if (isNaN(lat) || isNaN(lng) || !session) {
                document.getElementById('map').style.display = 'none';
                document.getElementById('info-card').style.display = 'none';
                document.getElementById('error-state').style.display = 'flex';
                return;
            }

            // Populate header
            document.getElementById('sharing-name').textContent = decodeURIComponent(name);
            document.title = `${decodeURIComponent(name)}'s Location — Tourist Safety`;

            // Coordinates
            document.getElementById('coords').textContent =
                `${lat.toFixed(6)}, ${lng.toFixed(6)}`;

            // Timestamp
            const now = new Date();
            document.getElementById('timestamp').textContent =
                now.toLocaleString(undefined, {
                    dateStyle: 'medium',
                    timeStyle: 'short'
                });

            // Init Map
            const map = L.map('map', {
                center: [lat, lng],
                zoom: 16,
                zoomControl: true,
            });

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19,
            }).addTo(map);

            // Pulsing circle
            const pulseCircle = L.circleMarker([lat, lng], {
                radius: 30,
                fillColor: '#4A9DFF',
                fillOpacity: 0.15,
                color: '#4A9DFF',
                weight: 1,
                opacity: 0.3,
            }).addTo(map);

            // Marker
            const markerHtml = `
                <div style="
                    width: 36px; height: 36px;
                    background: #4A9DFF;
                    border: 3px solid white;
                    border-radius: 50%;
                    box-shadow: 0 2px 12px rgba(74,157,255,0.5);
                    display: flex; align-items: center; justify-content: center;
                ">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
            `;

            const icon = L.divIcon({
                html: markerHtml,
                className: '',
                iconSize: [36, 36],
                iconAnchor: [18, 18],
            });

            L.marker([lat, lng], { icon }).addTo(map);

            // Animate pulse
            let growing = true;
            setInterval(() => {
                const r = pulseCircle.getRadius();
                if (r >= 40) growing = false;
                if (r <= 20) growing = true;
                pulseCircle.setRadius(r + (growing ? 0.5 : -0.5));
            }, 50);
        })();
    </script>
</body>
</html>
