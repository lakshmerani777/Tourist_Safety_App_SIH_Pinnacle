name: tourist_safety_app_sih_pinnacle
description: "Smart Tourist Safety Monitoring & Incident Response System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  google_fonts: ^6.2.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  intl: ^0.20.2
  pin_code_fields: ^8.0.0
  country_picker: ^2.0.20
  permission_handler: ^11.0.0
  url_launcher: ^6.2.0
  http: ^1.2.0
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.2
  geocoding: ^4.0.0
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
